name: Build and Release Cobra LANs

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the release'
        required: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build executable
      shell: cmd
      run: |
        pyinstaller ^
            --onefile ^
            --noconsole ^
            --uac-admin ^
            --name "Cobra LANs" ^
            --add-data "app;app" ^
            --collect-submodules app ^
            --collect-all numpy ^
            cobra_lans.py

    - name: Copy config files
      shell: cmd
      run: |
        if exist "config\games.yaml" (
            if not exist "dist\config" mkdir "dist\config"
            copy /Y "config\games.yaml" "dist\config\games.yaml"
        )

    - name: Verify build output
      run: dir dist

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: CobraLANs-build
        path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: CobraLANs-build
        path: build-output/

    - name: Zip build artifact
      run: zip -r CobraLANs-build.zip build-output/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Cobra LANs v${{ github.event.inputs.version }}
        files: CobraLANs-build.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}